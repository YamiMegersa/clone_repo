name: Deploy to Amazon Lightsail

on:
  push:
    branches: [ "LightSailMigration" ]
  workflow_dispatch:

env:
  NODE_VERSION: '20.x'
  DEPLOY_PATH: '/home/ubuntu/Lucs-Project'

jobs:
  build-test-deploy:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}

    - name: Install Dependencies
      run: |
        cd Back-end
        npm install

    # --- NEW: JEST TESTING STEP ---
    - name: Run Jest Tests
      env:
        # You may need to provide mock env vars so Sequelize doesn't crash
        NODE_ENV: test
        DB_HOST: localhost 
        GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
      run: |
        cd Back-end
        npm test 

    - name: Copy Files to Lightsail (SCP)
      # This step ONLY runs if "Run Jest Tests" passes
      uses: appleboy/scp-action@v0.1.7
      with:
        host: ${{ secrets.LIGHTSAIL_HOST }}
        username: ubuntu
        key: ${{ secrets.LIGHTSAIL_KEY }}
        source: "."
        target: ${{ env.DEPLOY_PATH }}

    - name: Restart Server via SSH
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.LIGHTSAIL_HOST }}
        username: ubuntu
        key: ${{ secrets.LIGHTSAIL_KEY }}
        script: |
          cd ${{ env.DEPLOY_PATH }}/Back-end
          npm install --production
          pm2 restart municipal-api || pm2 start server.js --name "municipal-api"
          pm2 save