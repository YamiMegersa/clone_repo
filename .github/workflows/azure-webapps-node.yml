name: Deploy to Amazon Lightsail

on:
  push:
    branches: [ "LightSailMigration" ]
  workflow_dispatch:

env:
  NODE_VERSION: '20.x'
  DEPLOY_PATH: '/home/ubuntu/Lucs-Project' # Target folder on your Lightsail instance

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}

    - name: Install Dependencies
      run: |
        cd Back-end
        npm install

    - name: Copy Files to Lightsail (SCP)
      uses: appleboy/scp-action@v0.1.7
      with:
        host: ${{ secrets.LIGHTSAIL_HOST }}
        username: ubuntu
        key: ${{ secrets.LIGHTSAIL_KEY }}
        source: "." # Copies the whole repo (Back-end and Front-end)
        target: ${{ env.DEPLOY_PATH }}

    - name: Restart Server via SSH
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.LIGHTSAIL_HOST }}
        username: ubuntu
        key: ${{ secrets.LIGHTSAIL_KEY }}
        script: |
          cd ${{ env.DEPLOY_PATH }}/Back-end
          npm install --production
          # This restarts your PM2 process or starts it if not running
          pm2 restart server.js --name "municipal-api" || pm2 start server.js --name "municipal-api"
          pm2 save