<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Groundwork | Field Operations Task Ledger</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@300;400;500;700;900&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<style>
    body { font-family: 'Public Sans', sans-serif; }
    
    .material-symbols-outlined {
        font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
    }

    /* EYE-FRIENDLY DROPDOWN STYLING */
    select.progress-dropdown {
        background-color: #1B1B1B !important; /* Matches surface-container-high */
        color: #A48C7A !important;            /* Matches on-surface-variant (soft gray) */
        border: 1px solid rgba(255, 255, 255, 0.05) !important;
    }

    /* Targets the actual popup list in the browser */
    select.progress-dropdown option {
        background-color: #1B1B1B;
        color: #A48C7A;
    }

    /* Scrollbar styling for the whole page */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: #000000; }
    ::-webkit-scrollbar-thumb { background: #353535; border-radius: 10px; }
</style>
<script id="tailwind-config">
        tailwind.config = {
          darkMode: "class",
          theme: {
            extend: {
              "colors": {
                      "surface": "#000000",
                      "surface-container": "#0E0E0E",
                      "surface-container-low": "#131313",
                      "surface-container-high": "#1B1B1B",
                      "primary": "#FF8C00",
                      "on-surface": "#E2E2E2",
                      "on-surface-variant": "#A48C7A",
                      "outline": "#353535"
              },
              "borderRadius": {
                      "DEFAULT": "0.25rem",
                      "lg": "0.5rem",
                      "xl": "0.75rem",
                      "full": "9999px"
              }
            },
          }
        }
    </script>
</head>
<body class="bg-surface text-on-surface min-h-screen flex flex-col">
<!-- Desktop Navigation -->
<header class="bg-surface-container/80 backdrop-blur-xl sticky top-0 z-50 px-10 py-4 flex justify-between items-center border-b border-outline/30">
<section class="flex items-center gap-10">
<span class="text-2xl font-black tracking-tighter text-on-surface uppercase">Groundwork</span>
</section>
<section class="flex items-center gap-6">
    <div id="notif-shell" class="notif-shell"></div>
    
    <!-- Profile dropdown -->
    <div class="relative" id="profile-dropdown-wrap">
        <button onclick="toggleProfileDropdown()" 
                class="flex items-center gap-3 cursor-pointer group">
            <figcaption class="hidden md:block text-right">
                <p class="text-xs font-bold">John Doe</p>
                <p class="text-[10px] text-on-surface-variant uppercase tracking-wider">Field Operative</p>
            </figcaption>
            <div class="relative">
                <img id="worker-avatar" 
                     alt="User profile photo" 
                     class="w-10 h-10 rounded-full border border-primary/50 object-cover group-hover:border-primary transition-colors" 
                     src="https://lh3.googleusercontent.com/aida-public/AB6AXuDvC3yQ8SK0p4ed_xI6R01Q4yNLiYfYod7D4q4x91q15xvNuh9_fvYZ2-EvRU-KQW96Ou9KCySlvcC_s_Stsb2zNw9yShUYYydYiSYL_BDXEOtTMKf9xqaLaMhQac_oCAzlFQ4q0oLz0grzsD6VFtBOLlI9EqZRLmEHyoPjD-4zRB5EEqwu8GmaTB8wSTVrsdijH-b1slQCm2cPje8z9yzkZBOp7Et361kOzocXdaoeLx8RGPObyYpgKpX86b69K9kWj1FmSfrwklM"/>
                <span class="absolute -bottom-0.5 -right-0.5 w-3 h-3 bg-surface-container rounded-full flex items-center justify-center">
                    <span class="material-symbols-outlined text-[10px] text-on-surface-variant">expand_more</span>
                </span>
            </div>
        </button>

        <!-- Dropdown menu -->
        <div id="profile-dropdown" 
             class="hidden absolute right-0 top-full mt-3 w-52 bg-[#1a1a1a] border border-white/08 rounded-xl shadow-2xl overflow-hidden z-[200]"
             style="border-color: rgba(255,255,255,0.08);">
            
            <!-- User info header -->
            <div class="px-4 py-3 border-b" style="border-color: rgba(255,255,255,0.06);">
                <p class="text-xs font-bold text-on-surface truncate" id="dropdown-name">Field Operative</p>
                <p class="text-[10px] text-on-surface-variant uppercase tracking-wider mt-0.5">Municipal Worker</p>
            </div>

            <!-- Menu items -->
            <ul class="py-1 list-none m-0 p-0">
                <li>
                    <button onclick="openEditProfile()" 
                            class="w-full flex items-center gap-3 px-4 py-3 text-xs font-bold uppercase tracking-widest text-on-surface-variant hover:text-primary hover:bg-white/4 transition-all text-left"
                            style="background:none; border:none; cursor:pointer;">
                        <span class="material-symbols-outlined text-base">manage_accounts</span>
                        Edit Profile
                    </button>
                </li>
                <li class="border-t" style="border-color: rgba(255,255,255,0.06);">
                    <button onclick="logoutWorker()" 
                            class="w-full flex items-center gap-3 px-4 py-3 text-xs font-bold uppercase tracking-widest text-red-400 hover:text-red-300 hover:bg-red-900/10 transition-all text-left"
                            style="background:none; border:none; cursor:pointer;">
                        <span class="material-symbols-outlined text-base">logout</span>
                        Logout
                    </button>
                </li>
            </ul>
        </div>
    </div>
</section>
</header>
<main class="flex-1 p-10 max-w-screen-xl mx-auto w-full flex flex-col gap-10">
<!-- Dashboard Header -->
<header>
<span class="text-xs font-bold uppercase tracking-[0.3em] text-primary mb-2 block">Operational Dashboard</span>
<h1 class="text-5xl font-black tracking-tight leading-none">Worker Overview</h1>
</header>
<!-- Consolidated Task Ledger Panel -->
<article class="bg-surface-container-low rounded-3xl border border-outline/30 overflow-hidden shadow-2xl flex flex-col">
<!-- Panel Header -->
<header class="p-8 border-b border-outline/20 bg-surface-container-high/50">
<h2 class="text-xs font-black uppercase tracking-[0.2em] text-primary">Active Tasks</h2>
</header>
<!-- Active Tasks Container -->
<section class="p-8 space-y-8" id="active-tasks-container"></section>
<!-- Queued Active Task -->
</section>
<!-- Completed Tasks (Dulled) -->
<section class="border-t border-outline/20">
    <header class="p-8 pb-4">
        <h2 class="text-xs font-black uppercase tracking-[0.2em] text-on-surface-variant">Completed Tasks</h2>
    </header>
    <section class="px-8 pb-8 space-y-4 opacity-40 grayscale hover:opacity-100 transition-opacity" id="completed-tasks-list">
        </section>
</section>

<footer class="p-6 bg-surface-container-high/30 border-t border-outline/20">
    <button onclick="toggleCompletedTasks()" class="w-full py-4 text-[10px] font-black uppercase tracking-[0.3em] text-on-surface-variant hover:text-primary transition-colors flex items-center justify-center gap-2">
        <span class="material-symbols-outlined text-sm">history</span> Show Completed Tasks
    </button>
</footer>
<section class="px-8 pb-8 space-y-4 opacity-40 grayscale hover:opacity-60 transition-opacity">
<!-- Sample Completed Task -->
</section>
</section>
</article>

</main>

<script src="WorkerHome.js" defer></script>
<script src="notifications-ui.js" defer></script>
<script src="profile-modal.js" defer></script>
<dialog id="task-detail-modal" class="fixed inset-0 z-[100] p-6 bg-black/90 backdrop-blur-md w-full h-full border-none flex items-center justify-center backdrop:bg-transparent open:flex hidden" aria-labelledby="detail-type">
    <article class="bg-surface-container-low border border-outline/30 w-full max-w-2xl p-10 rounded-3xl shadow-2xl overflow-y-auto max-h-[90vh]">
        <header class="flex justify-between items-start mb-8">
            <hgroup>
                <small id="detail-id" class="text-xs font-mono text-primary uppercase tracking-widest block mb-1"></small>
                <h2 id="detail-type" class="text-4xl font-black tracking-tighter"></h2>
            </hgroup>
            <button type="button" onclick="closeModal()" class="material-symbols-outlined hover:text-primary transition-colors text-on-surface p-2" aria-label="Close">
                close
            </button>
        </header>

        <section class="space-y-6">
            <figure>
                <figcaption class="text-[10px] font-black uppercase tracking-[0.2em] text-on-surface-variant mb-2">Situation Briefing</figcaption>
                <p id="detail-description" class="text-on-surface leading-relaxed"></p>
            </figure>
            
            <div class="flex gap-10">
                <section>
                    <h3 class="text-[10px] font-black uppercase tracking-[0.2em] text-on-surface-variant mb-1">Location</h3>
                    <p id="detail-ward" class="text-sm font-bold text-on-surface"></p>
                </section>
                <section>
                    <h3 class="text-[10px] font-black uppercase tracking-[0.2em] text-on-surface-variant mb-1">Current Status</h3>
                    <p id="detail-status" class="text-sm font-bold text-primary"></p>
                </section>
            </div>
        </section>

        <footer class="mt-10 pt-6 border-t border-outline/20">
            <button type="button" onclick="closeModal()" class="w-full py-4 text-[10px] font-black uppercase tracking-widest bg-surface-container-high text-on-surface rounded-xl hover:bg-outline transition-colors">
                Return to Ledger
            </button>
        </footer>
    </article>
</dialog>
</body></html>
