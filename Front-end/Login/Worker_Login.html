<!DOCTYPE html>
<html class="dark" lang="en">
<head>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <script src="/Login/Worker_login.js" defer></script>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Groundwork | Municipal Login</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "surface-container-low": "#1b1b1b",
                        "primary-container": "#ff8c00",
                        "primary": "#ffb77d",
                        "background": "#131313",
                        "on-surface": "#e2e2e2",
                        "surface-container-lowest": "#0e0e0e",
                        "surface-variant": "#353535"
                    }
                }
            }
        }
    </script>
    <style>
        body { font-family: 'Public Sans', sans-serif; overflow-x: hidden; }
        .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
        .monolith-bg {
            background-color: #131313;
            background-image: radial-gradient(circle at 2px 2px, #1b1b1b 1px, transparent 0);
            background-size: 40px 40px;
        }
    </style>
</head>
<body class="bg-background text-on-surface min-h-screen flex flex-col monolith-bg">

<header class="bg-primary-container w-full h-20 flex items-center justify-between px-8 z-50">
    <h1 class="text-white text-3xl font-black tracking-tighter uppercase">groundwork.</h1>
    
    <a id="back-to-login" href="/Login/Login.html" class="flex items-center gap-2 text-white/80 hover:text-white transition-colors group">
        <span class="material-symbols-outlined transition-transform group-hover:-translate-x-1">arrow_back</span>
        <span class="text-xs font-bold uppercase tracking-widest">Back to Login</span>
    </a>
</header>

<main class="flex-grow flex items-center justify-center px-4 py-12 relative overflow-hidden">
    <aside class="absolute top-1/4 -right-20 w-96 h-96 bg-primary-container opacity-5 blur-[120px] rounded-full"></aside>
    <aside class="absolute bottom-1/4 -left-20 w-96 h-96 bg-primary opacity-5 blur-[120px] rounded-full"></aside>

    <div id="worker-section" class="w-full max-w-md z-10 transition-all duration-500 ease-out transform opacity-0 translate-x-12">
        <article class="bg-surface-container-low p-10 rounded-lg shadow-2xl border-l-4 border-primary-container">
            <header class="mb-10">
                <h2 class="text-4xl font-extrabold tracking-tight text-on-surface mb-2 font-headline uppercase">Portal Access</h2>
                <p class="text-on-surface-variant text-sm font-label tracking-widest uppercase opacity-70">Municipal Worker Authentication</p>
            </header>

            <form id="MunicipalLoginForm" action="#" class="space-y-8" method="POST" novalidate>
                <section class="space-y-2">
                    <label class="block text-xs font-bold tracking-widest text-primary uppercase" for="municipalID">Municipal ID</label>
                    <section class="relative group">
                        <input class="w-full bg-surface-container-lowest border-none border-b-2 border-surface-variant focus:border-primary-container focus:ring-0 text-on-surface py-4 px-0 transition-all placeholder:text-surface-variant" id="municipalID" name="municipal-id" placeholder="Enter Badge or ID Number" required="" type="text"/>
                        <span class="absolute bottom-0 left-0 h-0.5 w-0 bg-primary-container transition-all duration-300 group-focus-within:w-full"></span>
                    </section>
                </section>

                <section class="space-y-2">
                    <label class="block text-xs font-bold tracking-widest text-primary uppercase" for="password">Password</label>
                    <section class="relative group">
                        <input class="w-full bg-surface-container-lowest border-none border-b-2 border-surface-variant focus:border-primary-container focus:ring-0 text-on-surface py-4 px-0 transition-all placeholder:text-surface-variant" id="password" name="password" placeholder="••••••••" required="" type="password"/>
                        <span class="absolute bottom-0 left-0 h-0.5 w-0 bg-primary-container transition-all duration-300 group-focus-within:w-full"></span>
                    </section>
                </section>

                <footer class="pt-4">
                    <button class="w-full bg-primary-container hover:bg-primary text-on-primary font-black py-5 rounded-lg tracking-widest uppercase transition-all active:scale-[0.98] shadow-lg shadow-primary-container/20" type="submit">LOGIN</button>
                </footer>
            </form>

            <section class="mt-8">
    <aside class="flex items-center gap-4 mb-6">
        <hr class="flex-grow border-surface-variant" aria-hidden="true">
        <span class="text-[10px] font-bold tracking-widest text-surface-variant uppercase">Or Identity Access</span>
        <hr class="flex-grow border-surface-variant" aria-hidden="true">
    </aside>
    
    <section class="flex justify-center">
        <address id="google-worker-btn" class="not-italic"></address>
    </section>
</section>

            <p id="error" class="hidden text-red-500 text-[10px] font-bold mt-1 uppercase tracking-tighter">ID is required to continue.</p>

            <nav class="mt-12 text-center">
                <a class="inline-block text-xs font-bold tracking-widest text-primary hover:text-primary-container transition-colors uppercase border-b border-primary/20 pb-1" href="#">SIGN UP AS A MUNICIPAL WORKER</a>
            </nav>
        </article>

        <section class="mt-8 flex justify-center gap-8 opacity-40">
            <article class="flex items-center gap-2 text-[10px] font-label uppercase tracking-tighter">
                <span class="material-symbols-outlined text-sm">security</span> Encrypted Ledger
            </article>
            <article class="flex items-center gap-2 text-[10px] font-label uppercase tracking-tighter">
                <span class="material-symbols-outlined text-sm">verified_user</span> Verified Access
            </article>
        </section>
    </div>
</main>

<script>
    // 1. Entrance Animation
    window.addEventListener('DOMContentLoaded', () => {
        const workerSection = document.getElementById('worker-section');
        if (workerSection) {
            // Small delay to ensure the browser registers the initial state before animating
            setTimeout(() => {
                workerSection.classList.remove('opacity-0', 'translate-x-12');
                workerSection.classList.add('opacity-100', 'translate-x-0');
            }, 100);
        }
    });

    // 2. Back Button Logic
    const backBtn = document.getElementById('back-to-login');
    const workerSection = document.getElementById('worker-section');

    backBtn.addEventListener('click', function(e) {
        e.preventDefault();
        const targetUrl = this.getAttribute('href');

        if (workerSection) {
            // Animation: Slide right and fade out
            workerSection.classList.remove('opacity-100', 'translate-x-0');
            workerSection.classList.add('opacity-0', 'translate-x-12');

            // Wait for animation to finish (500ms matches Tailwind duration-500)
            setTimeout(() => {
                window.location.href = targetUrl;
            }, 500);
        } else {
            // Fallback if element isn't found
            window.location.href = targetUrl;
        }
    });
</script>
</body>
</html>
