<!DOCTYPE html>
<html class="dark" lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Groundwork | Municipal Login</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "surface-container-low": "#1b1b1b",
                        "primary-container": "#ff8c00",
                        "primary": "#ffb77d",
                        "background": "#131313",
                        "on-surface": "#e2e2e2",
                        "surface-container-lowest": "#0e0e0e",
                        "surface-variant": "#353535"
                    }
                }
            }
        }
    </script>
    <style>
        body { font-family: 'Public Sans', sans-serif; overflow-x: hidden; }
        .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
        .monolith-bg {
            background-color: #131313;
            background-image: radial-gradient(circle at 2px 2px, #1b1b1b 1px, transparent 0);
            background-size: 40px 40px;
        }
    </style>
</head>
<body class="bg-background text-on-surface min-h-screen flex flex-col monolith-bg">

<header class="bg-primary-container w-full h-20 flex items-center justify-between px-8 z-50">
    <h1 class="text-white text-3xl font-black tracking-tighter uppercase">groundwork.</h1>
    
    <a id="back-to-login" href="login.html" class="flex items-center gap-2 text-white/80 hover:text-white transition-colors group">
        <span class="material-symbols-outlined transition-transform group-hover:-translate-x-1">arrow_back</span>
        <span class="text-xs font-bold uppercase tracking-widest">Back to Login</span>
    </a>
</header>

<main class="flex-grow flex items-center justify-center px-4 py-12 relative overflow-hidden">
    <section id="worker-section" class="w-full max-w-md z-10 transform transition-all duration-700 ease-out opacity-0 translate-x-12">
        <article class="bg-surface-container-low p-10 rounded-lg shadow-2xl border-l-4 border-primary-container">
            <header class="mb-10">
                <h2 class="text-4xl font-extrabold tracking-tight text-on-surface mb-2 uppercase">Portal Access</h2>
                <p class="text-on-surface-variant text-sm tracking-widest uppercase opacity-70">Municipal Worker Authentication</p>
            </header>

            <form action="#" class="space-y-8" method="POST">
                <section class="space-y-2">
                    <label class="block text-xs font-bold tracking-widest text-primary uppercase">Municipal ID</label>
                    <input class="w-full bg-surface-container-lowest border-none border-b-2 border-surface-variant focus:border-primary-container focus:ring-0 text-on-surface py-4 px-0 transition-all" placeholder="Enter Badge or ID Number" required type="text"/>
                </section>
                <section class="space-y-2">
                    <label class="block text-xs font-bold tracking-widest text-primary uppercase">Password</label>
                    <input class="w-full bg-surface-container-lowest border-none border-b-2 border-surface-variant focus:border-primary-container focus:ring-0 text-on-surface py-4 px-0 transition-all" placeholder="••••••••" required type="password"/>
                </section>
                <button class="w-full bg-primary-container hover:bg-primary text-white font-black py-5 rounded-lg tracking-widest uppercase transition-all shadow-lg shadow-primary-container/20" type="submit">LOGIN</button>
            </form>
        </article>
    </section>
</main>

<script>
    // 1. Entrance Animation (Slides in from RIGHT)
    window.addEventListener('DOMContentLoaded', () => {
        const workerSection = document.getElementById('worker-section');
        setTimeout(() => {
            workerSection.classList.remove('opacity-0', 'translate-x-12');
            workerSection.classList.add('opacity-100', 'translate-x-0');
        }, 100);
    });

    // 2. Back Button Logic (Slides out to RIGHT to go back)
    const backBtn = document.getElementById('back-to-login');
    const workerSection = document.getElementById('worker-section');

    backBtn.addEventListener('click', function(e) {
        e.preventDefault();
        const targetUrl = this.getAttribute('href');

        // Animation: Slide right and fade out
        workerSection.classList.add('opacity-0', 'translate-x-12');

        setTimeout(() => {
            window.location.href = targetUrl;
        }, 500);
    });
</script>

</body>
</html>
