<p class="text-on-surface-variant text-sm tracking-wide font-medium uppercase opacity-70">Enter your credentials to continue</p>

<form id="ResidentLoginForm" class="space-y-6">
<!-- Username Field -->
<fieldset class="space-y-2 border-none p-0 m-0">
<label class="block text-xs font-bold text-on-surface uppercase tracking-widest ml-1" for="username">Username</label>

<nav class="flex justify-between items-end">
<label class="block text-xs font-bold text-on-surface uppercase tracking-widest ml-1" for="password">Password</label>

</nav>

</fieldset>

<script>
  const workerLink = document.getElementById('worker-link');
  const mainCard = document.querySelector('article'); // Selects your login card

  workerLink.addEventListener('click', function(e) {
    e.preventDefault(); // Stop the instant jump
    const targetUrl = this.getAttribute('href');

    // Add Tailwind classes for the exit animation
    mainCard.classList.add('transition-all', 'duration-500', 'ease-in', 'opacity-0', '-translate-x-12');

    // Redirect after the animation finishes
    setTimeout(() => {
      window.location.href = targetUrl;
    }, 500);
  });
</script>
